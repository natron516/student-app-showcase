<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6th & 7th Grade App Showcase</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #fff9f0;
      --card1: #ff6b6b;
      --card2: #ffd93d;
      --card3: #6bcb77;
      --card4: #4d96ff;
      --dark: #1a1a2e;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Confetti dots background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, #ff6b6b44 2px, transparent 2px),
        radial-gradient(circle, #4d96ff44 2px, transparent 2px),
        radial-gradient(circle, #ffd93d44 2px, transparent 2px),
        radial-gradient(circle, #6bcb7744 2px, transparent 2px);
      background-size: 60px 60px, 80px 80px, 50px 50px, 70px 70px;
      background-position: 0 0, 30px 30px, 15px 45px, 45px 15px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px 40px;
    }

    .star-badge {
      display: inline-block;
      background: var(--dark);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 100px;
      margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 7vw, 5rem);
      color: var(--dark);
      line-height: 1.05;
      animation: slideUp 0.6s ease both 0.1s;
    }

    h1 span {
      display: inline-block;
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 8px;
      background: var(--card2);
      border-radius: 4px;
      z-index: -1;
    }

    .subtitle {
      margin-top: 14px;
      font-size: 1.15rem;
      color: #555;
      font-weight: 600;
      animation: slideUp 0.6s ease both 0.2s;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 32px 28px;
      border: 3px solid var(--dark);
      box-shadow: 6px 6px 0px var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: cardIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:nth-child(1) { animation-delay: 0.15s; --accent: var(--card1); }
    .card:nth-child(2) { animation-delay: 0.25s; --accent: var(--card2); }
    .card:nth-child(3) { animation-delay: 0.35s; --accent: var(--card3); }
    .card:nth-child(4) { animation-delay: 0.45s; --accent: var(--card4); }

    .card:hover {
      transform: translate(-3px, -4px);
      box-shadow: 9px 10px 0px var(--dark);
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--accent);
      border: 3px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .card-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--dark);
      text-align: center;
      line-height: 1.2;
    }

    .qr-wrapper {
      background: #fff;
      border: 3px solid var(--dark);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 3px 3px 0 var(--accent);
    }

    .qr-wrapper canvas,
    .qr-wrapper img {
      display: block;
      border-radius: 8px;
    }

    .visit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--dark);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      padding: 10px 22px;
      border-radius: 100px;
      border: 2.5px solid var(--dark);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 3px 3px 0 var(--dark);
      word-break: break-all;
      text-align: center;
    }

    .visit-btn:hover {
      transform: translate(-1px, -2px);
      box-shadow: 4px 5px 0 var(--dark);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 20px 40px;
      font-size: 0.9rem;
      color: #888;
      font-weight: 600;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes cardIn {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <div class="star-badge">⭐ Student Made ⭐</div>
    <h1>6th & 7th Grade<br><span>App Showcase</span></h1>
    <p class="subtitle">Scan a QR code or tap a link to try each app!</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>Made with 💛 by incredible young developers</footer>

  <script>
    const apps = [
      { name: "Feather Frenzy",      url: "https://FEATHER-FRENZY.replit.app",    emoji: "🐦" },
      { name: "Pretzel Rush",         url: "https://pretzel-rush.replit.app",       emoji: "🥨" },
      { name: "The Recipe Finder",    url: "https://The-Recipe-Finder.replit.app",  emoji: "🍳" },
      { name: "Hobbit Journey Quest", url: "https://hobbit-journey-quest.replit.app",emoji: "🧙" },
    ];

    const grid = document.getElementById('grid');

    apps.forEach((app, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--idx', i);

      const qrId = `qr-${i}`;

      card.innerHTML = `
        <div class="card-icon">${app.emoji}</div>
        <div class="card-name">${app.name}</div>
        <div class="qr-wrapper" id="${qrId}"></div>
        <a class="visit-btn" href="${app.url}" target="_blank" rel="noopener">
          🔗 ${app.url.replace('https://', '')}
        </a>
      `;

      grid.appendChild(card);

      // Generate QR code after inserting into DOM
      setTimeout(() => {
        new QRCode(document.getElementById(qrId), {
          text: app.url,
          width: 160,
          height: 160,
          colorDark: "#1a1a2e",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      }, 50);
    });
  </script>
</body>
</html>
