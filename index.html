<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
 <title>6th & 7th Grade App Showcase</title>
 <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
 <style>
 :root { --bg:#fff9f0; --dark:#1a1a2e; --white:#fff; }
 * { margin:0; padding:0; box-sizing:border-box; }
 html, body {
   font-family:'Nunito',sans-serif;
   background:var(--bg);
   height:100dvh; overflow:hidden;
 }
 .page {
   height:100dvh;
   display:flex; flex-direction:column;
   padding:4px 8px 2px;
 }
 header {
   flex-shrink:0;
   text-align:center;
   padding:2px 0 4px;
 }
 h1 {
   font-family:'Fredoka One',cursive;
   font-size:1.3rem; color:var(--dark); line-height:1;
   display:inline;
 }
 h1 span { position:relative; }
 h1 span::after {
   content:''; position:absolute;
   bottom:1px; left:0; right:0; height:5px;
   background:#ffd93d; border-radius:3px; z-index:-1;
 }
 .grid {
   flex:1;
   display:grid;
   grid-template-columns:repeat(4,1fr);
   grid-template-rows:repeat(2,1fr);
   gap:6px;
   min-height:0;
 }
 .card {
   background:var(--white);
   border-radius:12px;
   border:2.5px solid var(--dark);
   box-shadow:3px 3px 0 var(--dark);
   display:flex; flex-direction:column;
   align-items:center; justify-content:space-between;
   padding:5px 4px 4px;
   overflow:hidden;
   transition:transform 0.15s, box-shadow 0.15s;
 }
 .card:hover { transform:translate(-2px,-2px); box-shadow:5px 5px 0 var(--dark); }
 /* 7th card spans 2 columns and is centered in the second row */
 .card:last-child {
   grid-column: 2 / 4;
 }
 .card-name {
   font-family:'Fredoka One',cursive;
   font-size:0.9rem; color:var(--dark);
   text-align:center; line-height:1.1;
 }
 .card-credit {
   font-size:0.5rem; color:#999;
   font-weight:700; font-style:italic;
   text-align:center; line-height:1.1;
 }
 .click-count {
   font-family:'Fredoka One',cursive;
   font-size:0.7rem; color:var(--accent);
 }
 .qr-box { flex-shrink:0; }
 .qr-box canvas, .qr-box img { display:block; }
 .visit-btn {
   background:var(--accent); color:var(--dark);
   font-weight:800; font-size:0.5rem;
   padding:3px 8px; border-radius:100px;
   border:2px solid var(--dark);
   text-decoration:none;
   box-shadow:2px 2px 0 var(--dark);
   white-space:nowrap;
 }
 footer {
   flex-shrink:0; text-align:center;
   padding:1px 0;
   font-size:0.55rem; color:#bbb; font-weight:700;
 }
 @keyframes countPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
 .count-pop { animation:countPop 0.3s ease; }
 </style>
</head>
<body>
<div class="page">
  <header>
    <h1>⭐ 6th &amp; 7th Grade <span>App Showcase</span> ⭐</h1>
  </header>
  <div class="grid" id="grid"></div>
  <footer>Made with 💛 by incredible young developers</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA5qnahNEDXEo4CvDZi7PIqcKGfga0Oqn4",
  authDomain:"mrswilliamsmath-1d6de.firebaseapp.com",
  projectId:"mrswilliamsmath-1d6de",
  storageBucket:"mrswilliamsmath-1d6de.firebasestorage.app",
  messagingSenderId:"370339384366",
  appId:"1:370339384366:web:e2e5abfd8263b84db223bf"
});
const db = firebase.firestore();
const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#a855f7','#f97316','#14b8a6'];
const apps = [
  {name:"Feather Frenzy",      url:"https://FEATHER-FRENZY.replit.app",              emoji:"🐦", id:"feather-frenzy",  credit:"Johnny Hier & Donald O'Connor"},
  {name:"Pretzel Rush",        url:"https://pretzel-rush.replit.app",                emoji:"🥨", id:"pretzel-rush",    credit:"Jordan Hier"},
  {name:"The Recipe Finder",   url:"https://The-Recipe-Finder.replit.app",           emoji:"🍳", id:"recipe-finder",   credit:"Violet Hicks & Bonnie Martinez"},
  {name:"Hobbit Journey Quest",url:"https://hobbit-journey-quest.replit.app",        emoji:"🧙", id:"hobbit-journey",  credit:"Azalea Martinez"},
  {name:"Galaxy Shoot Out",    url:"https://galaxy-shoot-out.replit.app",            emoji:"🚀", id:"galaxy-shootout", credit:"Mike Hier"},
  {name:"Sunny Styles for Moms",url:"https://sunnystylesformoms.replit.app",         emoji:"☀️", id:"sunny-styles",    credit:"Clara Williams & Christine Kirk"},
  {name:"Bible Bricks",        url:"https://biblebricks-production.up.railway.app/", emoji:"🧱", id:"bible-bricks",    credit:"Whole Class", noCount:true},
];

const grid = document.getElementById('grid');

// Measure QR size after layout
function buildCards() {
  const headerH = document.querySelector('header').offsetHeight;
  const footerH = document.querySelector('footer').offsetHeight;
  const totalH = window.innerHeight;
  const totalW = window.innerWidth;
  const gridH = totalH - headerH - footerH - 6 - 6; // page padding + gap between rows
  const rowH = (gridH - 6) / 2;
  const colW = (totalW - 16 - 18) / 4; // page padding + 3 gaps

  // Text area: name(~16) + credit(~12) + visits(~14) + btn(~20) + padding(~9) + gaps
  const textH = 16 + 12 + 14 + 20 + 9 + 12;
  const maxFromH = rowH - textH;
  const maxFromW = colW - 12;
  const qrSize = Math.max(60, Math.min(Math.floor(maxFromH), Math.floor(maxFromW)));

  apps.forEach((app, i) => {
    const c = colors[i % colors.length];
    const qrId = `qr-${i}`, countId = `count-${i}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', c);
    card.innerHTML = `
      <div class="card-name">${app.emoji} ${app.name}</div>
      <div class="card-credit">${app.credit}</div>
      ${app.noCount ? '<div style="height:14px"></div>' : `<div class="click-count"><span id="${countId}">—</span> visits</div>`}
      <div class="qr-box" id="${qrId}"></div>
      <a class="visit-btn" href="${app.url}" target="_blank" rel="noopener" data-app-id="${app.id}">🔗 Open App</a>
    `;
    grid.appendChild(card);

    setTimeout(() => {
      new QRCode(document.getElementById(qrId), {
        text: app.url, width: qrSize, height: qrSize,
        colorDark:"#1a1a2e", colorLight:"#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }, 50);

    if (!app.noCount) {
      db.collection('app-clicks').doc(app.id).onSnapshot(doc => {
        const el = document.getElementById(countId);
        if (el) el.textContent = doc.exists ? (doc.data().clicks || 0) : '0';
      });
    }
  });
}

if (document.fonts) {
  document.fonts.ready.then(buildCards);
} else {
  setTimeout(buildCards, 150);
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.visit-btn');
  if (!btn) return;
  const appId = btn.dataset.appId;
  if (!appId) return;
  db.collection('app-clicks').doc(appId).set(
    {clicks: firebase.firestore.FieldValue.increment(1), lastClicked: new Date().toISOString()},
    {merge: true}
  );
});
</script>
</body>
</html>
