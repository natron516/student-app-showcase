<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>6th & 7th Grade App Showcase</title>
 <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
 <style>
 :root {
   --bg: #fff9f0;
   --card1: #ff6b6b; --card2: #ffd93d; --card3: #6bcb77;
   --card4: #4d96ff; --card5: #a855f7; --card6: #f97316; --card7: #14b8a6;
   --dark: #1a1a2e; --white: #ffffff;
 }
 * { margin: 0; padding: 0; box-sizing: border-box; }
 html, body {
   font-family: 'Nunito', sans-serif;
   background: var(--bg);
   overflow: hidden;
   height: 100%;
 }
 body::before {
   content: '';
   position: fixed; inset: 0;
   background-image:
     radial-gradient(circle, #ff6b6b33 2px, transparent 2px),
     radial-gradient(circle, #4d96ff33 2px, transparent 2px),
     radial-gradient(circle, #ffd93d33 2px, transparent 2px),
     radial-gradient(circle, #6bcb7733 2px, transparent 2px);
   background-size: 60px 60px, 80px 80px, 50px 50px, 70px 70px;
   background-position: 0 0, 30px 30px, 15px 45px, 45px 15px;
   pointer-events: none; z-index: 0;
 }
 .page {
   position: relative; z-index: 1;
   height: 100vh;
   display: flex;
   flex-direction: column;
   padding: 16px 20px 12px;
 }
 header {
   text-align: center;
   padding-bottom: 10px;
   flex-shrink: 0;
 }
 .star-badge {
   display: inline-block;
   background: var(--dark); color: var(--white);
   font-weight: 800; font-size: 0.7rem;
   letter-spacing: 0.15em; text-transform: uppercase;
   padding: 5px 14px; border-radius: 100px;
   margin-bottom: 6px;
 }
 h1 {
   font-family: 'Fredoka One', cursive;
   font-size: 2rem; color: var(--dark); line-height: 1.05;
 }
 h1 span { display: inline-block; position: relative; }
 h1 span::after {
   content: ''; position: absolute;
   bottom: 2px; left: 0; right: 0; height: 6px;
   background: var(--card2); border-radius: 3px; z-index: -1;
 }
 .subtitle {
   margin-top: 4px; font-size: 0.85rem; color: #777; font-weight: 600;
 }
 .grid {
   flex: 1;
   display: grid;
   grid-template-columns: repeat(4, 1fr);
   grid-template-rows: repeat(2, 1fr);
   gap: 10px;
   padding: 4px 0;
 }
 .card {
   background: var(--white);
   border-radius: 16px;
   padding: 6px 6px;
   border: 2.5px solid var(--dark);
   box-shadow: 4px 4px 0px var(--dark);
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   gap: 2px;
   transition: transform 0.15s ease, box-shadow 0.15s ease;
   animation: cardIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
   cursor: pointer;
   text-decoration: none;
   color: inherit;
   min-width: 0;
 }
 .card:nth-child(1) { animation-delay: 0.1s; --accent: var(--card1); }
 .card:nth-child(2) { animation-delay: 0.15s; --accent: var(--card2); }
 .card:nth-child(3) { animation-delay: 0.2s; --accent: var(--card3); }
 .card:nth-child(4) { animation-delay: 0.25s; --accent: var(--card4); }
 .card:nth-child(5) { animation-delay: 0.3s; --accent: var(--card5); }
 .card:nth-child(6) { animation-delay: 0.35s; --accent: var(--card6); }
 .card:nth-child(7) { animation-delay: 0.4s; --accent: var(--card7); }
 .card:hover {
   transform: translate(-2px, -3px);
   box-shadow: 6px 7px 0px var(--dark);
 }
 .card-icon {
   width: 28px; height: 28px;
   border-radius: 8px;
   background: var(--accent);
   border: 2px solid var(--dark);
   display: flex; align-items: center; justify-content: center;
   font-size: 1rem; flex-shrink: 0;
 }
 .card-name {
   font-family: 'Fredoka One', cursive;
   font-size: 1rem; color: var(--dark);
   text-align: center; line-height: 1.1;
 }
 .card-credit {
   font-size: 0.7rem; color: #888;
   font-weight: 700; font-style: italic;
   text-align: center; line-height: 1.15;
 }
 .click-count {
   display: inline-flex; align-items: center; gap: 3px;
   background: var(--bg);
   border: 1.5px solid var(--dark);
   border-radius: 100px;
   padding: 2px 8px;
   font-weight: 800; font-size: 0.65rem; color: var(--dark);
 }
 .click-count .count-num {
   font-family: 'Fredoka One', cursive;
   font-size: 0.8rem; color: var(--accent);
   min-width: 14px; text-align: center;
 }
 .qr-wrapper {
   flex-shrink: 0;
 }
 .qr-wrapper canvas, .qr-wrapper img { display: block; }
 .visit-btn {
   display: inline-flex; align-items: center; gap: 4px;
   background: var(--accent); color: var(--dark);
   font-family: 'Nunito', sans-serif;
   font-weight: 800; font-size: 0.6rem;
   padding: 4px 10px; border-radius: 100px;
   border: 2px solid var(--dark);
   text-decoration: none;
   transition: transform 0.12s ease;
   box-shadow: 2px 2px 0 var(--dark);
   white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
   max-width: 100%;
 }
 .visit-btn:hover {
   transform: translate(-1px, -1px);
   box-shadow: 3px 3px 0 var(--dark);
 }
 footer {
   flex-shrink: 0;
   text-align: center;
   padding: 4px 0;
   font-size: 0.7rem; color: #aaa; font-weight: 600;
 }
 @keyframes cardIn {
   from { transform: translateY(20px) scale(0.95); opacity: 0; }
   to { transform: translateY(0) scale(1); opacity: 1; }
 }
 @keyframes countPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
 .count-pop { animation: countPop 0.3s ease; }

 /* Portrait iPad — 3 cols, tighter */
 @media (max-width: 820px) and (orientation: portrait) {
   .grid {
     grid-template-columns: repeat(3, 1fr);
     grid-template-rows: repeat(3, 1fr);
   }
   h1 { font-size: 1.6rem; }
   .card { padding: 10px 8px; gap: 4px; }
   .card-icon { width: 36px; height: 36px; font-size: 1.1rem; }
   .card-name { font-size: 0.75rem; }
 }

 /* Phone */
 @media (max-width: 500px) {
   .page { overflow-y: auto; height: auto; }
   html, body { overflow: auto; }
   .grid {
     grid-template-columns: repeat(2, 1fr);
     grid-template-rows: auto;
   }
 }
 </style>
</head>
<body>

 <div class="page">
   <header>
     <div class="star-badge">⭐ Student Made ⭐</div>
     <h1>6th & 7th Grade <span>App Showcase</span></h1>
     <p class="subtitle">Scan a QR code or tap to try each app!</p>
   </header>

   <div class="grid" id="grid"></div>

   <footer>Made with 💛 by incredible young developers</footer>
 </div>

 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
 <script>
 firebase.initializeApp({
   apiKey: "AIzaSyA5qnahNEDXEo4CvDZi7PIqcKGfga0Oqn4",
   authDomain: "mrswilliamsmath-1d6de.firebaseapp.com",
   projectId: "mrswilliamsmath-1d6de",
   storageBucket: "mrswilliamsmath-1d6de.firebasestorage.app",
   messagingSenderId: "370339384366",
   appId: "1:370339384366:web:e2e5abfd8263b84db223bf"
 });
 const db = firebase.firestore();

 const apps = [
   { name: "Feather Frenzy",      url: "https://FEATHER-FRENZY.replit.app",               emoji: "🐦", id: "feather-frenzy",  credit: "Johnny Hier & Donald O'Connor" },
   { name: "Pretzel Rush",         url: "https://pretzel-rush.replit.app",                  emoji: "🥨", id: "pretzel-rush",     credit: "Jordan Hier" },
   { name: "The Recipe Finder",    url: "https://The-Recipe-Finder.replit.app",             emoji: "🍳", id: "recipe-finder",    credit: "Violet Hicks & Bonnie Martinez" },
   { name: "Hobbit Journey Quest", url: "https://hobbit-journey-quest.replit.app",          emoji: "🧙", id: "hobbit-journey",   credit: "Azalea Martinez" },
   { name: "Galaxy Shoot Out",     url: "https://galaxy-shoot-out.replit.app",              emoji: "🚀", id: "galaxy-shootout",  credit: "Mike Hier" },
   { name: "Sunny Styles for Moms",url: "https://sunnystylesformoms.replit.app",            emoji: "☀️", id: "sunny-styles",     credit: "Clara Williams & Christine Kirk" },
   { name: "Bible Bricks",         url: "https://biblebricks-production.up.railway.app/",   emoji: "🧱", id: "bible-bricks",     credit: "Whole Class", noCount: true },
 ];

 const grid = document.getElementById('grid');
 const qrSize = window.innerWidth < 820 ? 90 : 120;

 apps.forEach((app, i) => {
   const qrId = `qr-${i}`;
   const countId = `count-${i}`;
   const card = document.createElement('div');
   card.className = 'card';
   const shortUrl = app.url.replace('https://','').replace(/\/$/,'');
   card.innerHTML = `
     <div class="card-icon">${app.emoji}</div>
     <div class="card-name">${app.name}</div>
     <div class="card-credit">${app.credit}</div>
     ${app.noCount ? '' : `<div class="click-count">👆 <span class="count-num" id="${countId}">—</span></div>`}
     <div class="qr-wrapper" id="${qrId}"></div>
     <a class="visit-btn" href="${app.url}" target="_blank" rel="noopener" data-app-id="${app.id}">
       🔗 ${shortUrl.length > 25 ? shortUrl.substring(0,25)+'…' : shortUrl}
     </a>
   `;
   grid.appendChild(card);

   setTimeout(() => {
     new QRCode(document.getElementById(qrId), {
       text: app.url, width: qrSize, height: qrSize,
       colorDark: "#1a1a2e", colorLight: "#ffffff",
       correctLevel: QRCode.CorrectLevel.M
     });
   }, 50);

   if (!app.noCount) {
     db.collection('app-clicks').doc(app.id).onSnapshot(doc => {
       const el = document.getElementById(countId);
       if (el) el.textContent = doc.exists ? (doc.data().clicks || 0) : '0';
     });
   }
 });

 document.addEventListener('click', e => {
   const btn = e.target.closest('.visit-btn');
   if (!btn) return;
   const appId = btn.dataset.appId;
   if (!appId) return;
   db.collection('app-clicks').doc(appId).set(
     { clicks: firebase.firestore.FieldValue.increment(1), lastClicked: new Date().toISOString() },
     { merge: true }
   );
   const countEl = btn.closest('.card').querySelector('.count-num');
   countEl.classList.remove('count-pop');
   void countEl.offsetWidth;
   countEl.classList.add('count-pop');
 });
 </script>
</body>
</html>
