<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
 <title>6th & 7th Grade App Showcase</title>
 <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
 <style>
 :root {
   --bg: #fff9f0;
   --dark: #1a1a2e;
   --white: #fff;
 }
 * { margin: 0; padding: 0; box-sizing: border-box; }
 html, body {
   font-family: 'Nunito', sans-serif;
   background: var(--bg);
   height: 100dvh;
   overflow: hidden;
 }
 .page {
   height: 100dvh;
   display: flex;
   flex-direction: column;
   padding: 4px 10px 2px;
 }
 header {
   text-align: center;
   padding: 2px 0 6px;
   flex-shrink: 0;
 }
 h1 {
   font-family: 'Fredoka One', cursive;
   font-size: 1.4rem;
   color: var(--dark);
   line-height: 1;
   display: inline;
 }
 h1 span { position: relative; }
 h1 span::after {
   content: '';
   position: absolute;
   bottom: 1px; left: 0; right: 0; height: 5px;
   background: #ffd93d;
   border-radius: 3px;
   z-index: -1;
 }

 /* Two rows: top row 4 cards, bottom row 3 cards centered */
 .grid-wrapper {
   flex: 1;
   display: flex;
   flex-direction: column;
   gap: 6px;
   min-height: 0;
 }
 .grid-row {
   flex: 1;
   display: flex;
   gap: 6px;
   justify-content: center;
   min-height: 0;
 }

 .card {
   background: var(--white);
   border-radius: 12px;
   border: 2.5px solid var(--dark);
   box-shadow: 3px 3px 0 var(--dark);
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: flex-start;
   gap: 2px;
   padding: 6px 6px 5px;
   text-decoration: none;
   color: inherit;
   overflow: hidden;
   transition: transform 0.15s, box-shadow 0.15s;
   /* Each card takes equal width in its row */
   flex: 0 0 calc(25% - 5px);
   min-width: 0;
 }
 .grid-row:last-child .card {
   flex: 0 0 calc(25% - 5px);
 }
 .card:hover {
   transform: translate(-2px, -2px);
   box-shadow: 5px 5px 0 var(--dark);
 }
 .card-name {
   font-family: 'Fredoka One', cursive;
   font-size: 0.95rem;
   color: var(--dark);
   text-align: center;
   line-height: 1.1;
 }
 .card-credit {
   font-size: 0.55rem;
   color: #999;
   font-weight: 700;
   font-style: italic;
   text-align: center;
   line-height: 1.1;
 }
 .click-count {
   font-family: 'Fredoka One', cursive;
   font-size: 0.75rem;
   color: var(--accent);
 }
 .qr-box {
   flex-shrink: 0;
   display: flex;
   align-items: center;
   justify-content: center;
 }
 .qr-box canvas, .qr-box img { display: block; }
 .visit-btn {
   background: var(--accent);
   color: var(--dark);
   font-weight: 800;
   font-size: 0.55rem;
   padding: 3px 10px;
   border-radius: 100px;
   border: 2px solid var(--dark);
   text-decoration: none;
   box-shadow: 2px 2px 0 var(--dark);
   white-space: nowrap;
   overflow: hidden;
   text-overflow: ellipsis;
   max-width: 100%;
   margin-top: auto;
 }
 footer {
   flex-shrink: 0;
   text-align: center;
   padding: 2px 0;
   font-size: 0.6rem;
   color: #bbb;
   font-weight: 700;
 }
 @keyframes countPop {
   0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)}
 }
 .count-pop { animation: countPop 0.3s ease; }

 /* Tablet portrait: 3+2+2 or just scroll */
 @media (max-width: 820px) and (orientation: portrait) {
   html, body { overflow: auto; height: auto; }
   .page { height: auto; }
   .grid-wrapper { gap: 8px; }
   .grid-row { flex-wrap: wrap; }
   .card { flex: 0 0 calc(33.333% - 6px); }
   .grid-row:last-child .card { flex: 0 0 calc(33.333% - 6px); }
 }
 @media (max-width: 500px) {
   html, body { overflow: auto; height: auto; }
   .page { height: auto; }
   .grid-row { flex-wrap: wrap; }
   .card { flex: 0 0 calc(50% - 4px); }
   .grid-row:last-child .card { flex: 0 0 calc(50% - 4px); }
 }
 </style>
</head>
<body>
 <div class="page">
   <header>
     <h1>⭐ 6th & 7th Grade <span>App Showcase</span> ⭐</h1>
   </header>
   <div class="grid-wrapper">
     <div class="grid-row" id="row1"></div>
     <div class="grid-row" id="row2"></div>
   </div>
   <footer>Made with 💛 by incredible young developers</footer>
 </div>

 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
 <script>
 firebase.initializeApp({
   apiKey:"AIzaSyA5qnahNEDXEo4CvDZi7PIqcKGfga0Oqn4",
   authDomain:"mrswilliamsmath-1d6de.firebaseapp.com",
   projectId:"mrswilliamsmath-1d6de",
   storageBucket:"mrswilliamsmath-1d6de.firebasestorage.app",
   messagingSenderId:"370339384366",
   appId:"1:370339384366:web:e2e5abfd8263b84db223bf"
 });
 const db = firebase.firestore();
 const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#a855f7','#f97316','#14b8a6'];
 const apps = [
   {name:"Feather Frenzy",     url:"https://FEATHER-FRENZY.replit.app",              emoji:"🐦", id:"feather-frenzy",  credit:"Johnny Hier & Donald O'Connor"},
   {name:"Pretzel Rush",       url:"https://pretzel-rush.replit.app",                emoji:"🥨", id:"pretzel-rush",    credit:"Jordan Hier"},
   {name:"The Recipe Finder",  url:"https://The-Recipe-Finder.replit.app",           emoji:"🍳", id:"recipe-finder",   credit:"Violet Hicks & Bonnie Martinez"},
   {name:"Hobbit Journey Quest",url:"https://hobbit-journey-quest.replit.app",       emoji:"🧙", id:"hobbit-journey",  credit:"Azalea Martinez"},
   {name:"Galaxy Shoot Out",   url:"https://galaxy-shoot-out.replit.app",            emoji:"🚀", id:"galaxy-shootout", credit:"Mike Hier"},
   {name:"Sunny Styles for Moms",url:"https://sunnystylesformoms.replit.app",        emoji:"☀️", id:"sunny-styles",    credit:"Clara Williams & Christine Kirk"},
   {name:"Bible Bricks",       url:"https://biblebricks-production.up.railway.app/", emoji:"🧱", id:"bible-bricks",    credit:"Whole Class", noCount:true},
 ];

 // Split: 4 top, 3 bottom
 const row1 = document.getElementById('row1');
 const row2 = document.getElementById('row2');

 // QR size: fit within card — measure after layout settles
 function getQRSize(rowEl, isBottomRow) {
   const vh = window.innerHeight;
   const headerH = document.querySelector('header').offsetHeight;
   const footerH = document.querySelector('footer').offsetHeight;
   const available = vh - headerH - footerH - 12 - 6; // padding + gap
   const rowH = available / 2;
   // Card height minus text elements (~title 18px, credit 14px, visits 16px, btn 22px, padding 22px)
   const textH = 18 + 14 + 16 + 22 + 22;
   const maxQR = Math.floor(rowH - textH);
   return Math.max(80, Math.min(maxQR, 150));
 }

 function buildCard(app, i, container, qrSize) {
   const c = colors[i % colors.length];
   const qrId = `qr-${i}`, countId = `count-${i}`;
   const card = document.createElement('div');
   card.className = 'card';
   card.style.setProperty('--accent', c);
   card.innerHTML = `
     <div class="card-name">${app.emoji} ${app.name}</div>
     <div class="card-credit">${app.credit}</div>
     ${app.noCount ? '<div style="height:1em"></div>' : `<div class="click-count"><span id="${countId}">—</span> visits</div>`}
     <div class="qr-box" id="${qrId}"></div>
     <a class="visit-btn" href="${app.url}" target="_blank" rel="noopener" data-app-id="${app.id}">🔗 Open App</a>
   `;
   container.appendChild(card);

   setTimeout(() => {
     new QRCode(document.getElementById(qrId), {
       text: app.url, width: qrSize, height: qrSize,
       colorDark:"#1a1a2e", colorLight:"#ffffff",
       correctLevel: QRCode.CorrectLevel.M
     });
   }, 50);

   if (!app.noCount) {
     db.collection('app-clicks').doc(app.id).onSnapshot(doc => {
       const el = document.getElementById(countId);
       if (el) el.textContent = doc.exists ? (doc.data().clicks || 0) : '0';
     });
   }
 }

 // Build after a brief paint so we can measure
 requestAnimationFrame(() => {
   requestAnimationFrame(() => {
     const qrSize = getQRSize();
     apps.slice(0, 4).forEach((app, i) => buildCard(app, i, row1, qrSize));
     apps.slice(4).forEach((app, i) => buildCard(app, i + 4, row2, qrSize));
   });
 });

 document.addEventListener('click', e => {
   const btn = e.target.closest('.visit-btn');
   if (!btn) return;
   const appId = btn.dataset.appId;
   if (!appId) return;
   db.collection('app-clicks').doc(appId).set(
     {clicks: firebase.firestore.FieldValue.increment(1), lastClicked: new Date().toISOString()},
     {merge: true}
   );
 });
 </script>
</body>
</html>
